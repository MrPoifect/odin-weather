<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Weather</title><script defer="defer" src="main.js"></script></head><body><div id="container"><div id="header"><h1>Weather.</h1><form action=""><input type="search" name="search" id="search-bar" placeholder="Search city"/></form></div><div id="weather-container"><div id="weather-results"><div id="title"><h3 id="condition">Cloudy</h3><h2><span id="city">London</span>, <span id="country">England</span></h2></div><div id="info"><div id="temp-main"><p id="temp">69</p><p class="temp-icon big">°F</p></div><div id="extra-info"><ol id="info-list"><li>Feels like:<div><span id="temp-feel">21</span><span class="temp-icon small">°F</span></div></li><li>Wind: <span id="wind-speed">6</span><span id="speed-unit">MPH</span></li><li>Humidity:<div><span id="humidity">32</span>%</div></li></ol></div></div></div><dialog id="error-modal"><p id="error-text"></p><button id="close-btn"></button></dialog></div><div id="footer"></div></div></body></html>
